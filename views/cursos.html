<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos FCAD- UNER</title>
    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/bootstrap-reboot.min.css">
    <link rel="stylesheet" href="./css/estiloTablaContenido.css">
    <script src="./js/cursos.js" type="module" defer></script>
</head>

<body>

    <header>
        <div class="contenedor">
            <h1>Cursos FCAD- UNER</h1>
            <img src="./img/Logo.png" alt="Logo de la Facultad de Ciencias de la Administración">
        </div>
    </header>
    <div class="contenedor-principal ">
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="cursos.html">Cursos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="estudiantes.html">Estudiantes</a></li>
                <li><a href="inscripciones.html">Inscripciones</a></li>
            </ul>


        </nav>


        <main>
            <div class="contenedor-cursos">
                <div class="header-seccion">
                    <h2>Cursos</h2>

                    <div class="boton-nuevo">
                        <a href="cursos-nuevo.html" class="btn btn-secondary">+Nuevo Curso</a>
                    </div>


                </div>
                <input type="text" id="buscarCurso" placeholder="Buscar por ID">
                <input type="text" id="buscarNombre" placeholder="Buscar por nombre">
                <select  id="estado" class="form-control">
                    <option value="">TODOS</option>
                    <option value="1">BORRADOR</option>
                    <option value="2">INSCRIPCIÓN ABIERTA</option>
                    <option value="3">INSCRIPCIÓN CERRADA</option>
                </select>
                <br>
                <button id="btnBuscar" class="btn btn-primary">buscar</button>

            </div>
            <div class="tabla-card">
                <table class="table table-bordered text-center">
                    <thead>
                        <tr>
                            <th class="text-center">ID</th>
                            <th class="text-center">Curso</th>
                            <th class="text-center">Descripcion</th>
                            <th class="text-center">Fecha Inicio</th>
                            <th class="text-center">Cantidad de horas</th>
                            <th class="text-center">Inscriptos</th>
                            <th class="text-center">Estado</th>
                        </tr>
                    </thead>

                    <tbody id="tbody">
                    </tbody>
                </table>

                <div class="footer-tabla">
                    <div class="paginacion">
                        <button id="ButtonBack">← Ant</button>
                        <a id="NumberPage"></a>
                        <button id="ButtonNext">Sig →</button>
                    </div>
                </div>
            </div>

        </main>
    </div>
    <footer>
        <p>&copy; 2026 Prog4202601_O . All rights reserved.</p>
    </footer>
</body>
