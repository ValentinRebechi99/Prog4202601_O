    <header>

        </div>
    </header>
    <div class="contenedor-principal ">
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>

        <main>

                    <h2>Cursos</h2>
                    <div class="boton-mod">

                    </div>
                    <div class="boton-nuevo">
                        <a href="cursos-nuevo.html" class="btn btn-secondary">+Nuevo Curso</a>
                    </div>
                    
                    
                </div>


                    <div class="filtros-cursos">

                            <option>En Curso</option>

                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Curso</th>
                                    <th>Descripcion</th>
                                    <th>Fecha Inicio</th>
                                    <th>Cantidad de horas</th>
                                    <th>Maximo Inscriptos</th>
                                    <th>Estado</th>

                                </tr>
                            </thead>
                            <tbody id="tbody"> </tbody>
                            <tr>
                            </tr>

                        </table>

                        <div class="footer-tabla">
                            <span class="badge-registros">x Registros</span>
                            <div class="paginacion">
                                <button disabled>← Ant</button>
